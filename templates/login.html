{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<!-- login form here -->


<!-- Container centers content horizontally -->
<div class="container">

  <!-- Row + column system centers vertically nicely -->
  <div class="row justify-content-center align-items-center vh-100">

    <!-- Responsive login card -->
    <div class="col-md-3 col-sm-4">

      <!-- Bootstrap card component -->
      <div class="shadow p-3 rounded border-0">
        <div class="card-body">

          <h4 class="card-title text-center mb-3">
            Login
          </h4>

          <form method="post">

            <!-- Username field -->
            <div class="mb-2">
              <input name="username" class="form-control" placeholder="Username" required
              style="font-size: 0.7rem;">
            </div>

            <!-- Password field -->
            <div class="mb-2">
              <input name="password" type="password" class="form-control" placeholder="Password" required
              style="font-size: 0.7rem;">
            </div>

            <!-- Submit button full width -->
            <button class="btn btn-primary w-100" style="font-size: 0.7rem;">
              Login
            </button>

            <!-- Error message from Flask -->
            {% if error %}
            <div class="alert alert-danger mt-2" style="font-size: 0.7rem; padding: 10px;">
              {{ error }}
            </div>
            {% endif %}

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
